name: Crawler - 定时抓取AI中转商数据

on:
  schedule:
    # 每3小时运行一次
    - cron: '0 */3 * * *'
  workflow_dispatch:
    inputs:
      platform:
        description: '指定爬虫平台 (v2ex/nodeseek/linux.do/xiaohongshu/all)'
        required: false
        default: 'all'
      task:
        description: '运行任务 (crawl/pricing/all)'
        required: false
        default: 'all'

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run crawler (商家信息采集)
      env:
        AI_API_KEY: ${{ secrets.AI_API_KEY }}
        AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
        AI_MODEL: ${{ secrets.AI_MODEL }}
      run: |
        TASK="${{ github.event.inputs.task || 'all' }}"
        if [ "$TASK" = "all" ] || [ "$TASK" = "crawl" ]; then
          PLATFORM="${{ github.event.inputs.platform || 'all' }}"
          if [ "$PLATFORM" = "all" ]; then
            npx tsx crawler/run.ts
          else
            npx tsx crawler/run.ts "$PLATFORM"
          fi
        fi

    - name: Run pricing crawler (价格采集)
      env:
        CRAWL_API_KEY: ${{ secrets.CRAWL_API_KEY }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: |
        TASK="${{ github.event.inputs.task || 'all' }}"
        if [ "$TASK" = "all" ] || [ "$TASK" = "pricing" ]; then
          npx tsx scripts/crawl-pricing-v3.ts
        fi
        
    - name: Sync pricing data to database
      if: always()
      env:
        CRAWL_API_KEY: ${{ secrets.CRAWL_API_KEY }}
      run: |
        TASK="${{ github.event.inputs.task || 'all' }}"
        if [ "$TASK" = "all" ] || [ "$TASK" = "pricing" ]; then
          if [ -f "data/pricing-results.json" ]; then
            curl -X POST "https://ai-relay-dashboard.vercel.app/api/crawl/pricing" \
              -H "Content-Type: application/json" \
              -H "x-crawl-api-key: ${CRAWL_API_KEY}" \
              -d @data/pricing-results.json || echo "Failed to sync pricing data"
          fi
        fi
        
    - name: Check for changes
      id: check_changes
      run: |
        git status
        if git diff --quiet data/; then
          echo "changed=false" >> $GITHUB_OUTPUT
          echo "No changes detected"
        else
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "Changes detected"
        fi
        
    - name: Commit and push changes
      if: steps.check_changes.outputs.changed == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/
        git commit -m "🤖 自动更新: $(date +'%Y-%m-%d %H:%M') 爬虫数据"
        git push
